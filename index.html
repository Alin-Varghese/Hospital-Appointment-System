<!DOCTYPE html>
<html>
<head>
    <title>Hospital Appointment System</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        overflow:hidden;
    }

    body::before{
        content:"";
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;

        background:url("hospital.png");
        background-size:cover;
        background-position:center;

        opacity:0.8;
        z-index:-1;
    }

    .container{
        width:700px;
        background:rgba(255, 255, 255, 0.9);
        padding:40px;
        border-radius:15px;
        box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    h1{
        text-align:center;
        color:#0077ff;
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:#666;
        margin-bottom:30px;
    }

    .row{
        display:flex;
        gap:15px;
    }

    .input-group{
        width:100%;
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:6px;
        font-weight:600;
        color:#333;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
        font-size:15px;
    }

    input:focus{
        border-color:#0077ff;
    }

    .btn{
        width:100%;
        padding:13px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
        font-weight:600;
        transition:0.3s;
    }

    .signup-btn{
        background:#0077ff;
        color:white;
    }

    .signup-btn:hover{
        background:#005fd1;
    }

    .login-btn{
        background:#28a745;
        color:white;
    }

    .login-btn:hover{
        background:#1f8a38;
    }

    .divider{
        text-align:center;
        margin:20px 0;
        color:#777;
        font-weight:bold;
    }

    #message{
        text-align:center;
        margin-top:15px;
        font-weight:bold;
    }

    @media(max-width:768px){

        .container{
            width:95%;
            padding:25px;
        }

        .row{
            flex-direction:column;
            gap:0;
        }
    }

    </style>
</head>

<body>

<div class="container">

    <h1>🏥 Hospital Appointment System</h1>

    <p class="subtitle">
        Book appointments with trusted specialists
    </p>

    <div class="row">

        <div class="input-group">
            <label>Username</label>

            <input
            type="text"
            id="username"
            placeholder="Enter Username">
        </div>

        <div class="input-group">
            <label>Email</label>

            <input
            type="email"
            id="email"
            placeholder="Enter Email">
        </div>

    </div>

    <div class="input-group">

        <label>Password</label>

        <input
        type="password"
        id="password"
        placeholder="Enter Password">

    </div>

    <button
    class="btn signup-btn"
    onclick="signup()">

    Sign Up

    </button>

    <div class="divider">
        ───────── OR ─────────
    </div>

    <button
    class="btn login-btn"
    onclick="login()">

    Login

    </button>

    <p id="message"></p>

</div>

<script>

function signup(){

    let username =
    document.getElementById("username").value;

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    if(
        username==="" ||
        email==="" ||
        password===""
    ){

        document.getElementById("message")
        .innerHTML =
        "Please fill all fields";

        return;
    }

    let user = {

        username:username,
        email:email,
        password:password

    };

    localStorage.setItem(
        "user",
        JSON.stringify(user)
    );

    document.getElementById("message")
    .style.color = "green";

    document.getElementById("message")
    .innerHTML =
    "Signup Successful ✓";

}

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    let storedUser =
    JSON.parse(
    localStorage.getItem("user")
    );

    if(
        storedUser &&
        username===storedUser.username &&
        password===storedUser.password
    ){

        window.location.href =
        "doctors.html";

    }

    else{

        document.getElementById("message")
        .style.color = "red";

        document.getElementById("message")
        .innerHTML =
        "Invalid Username or Password";

    }

}

</script>

</body>
</html>
